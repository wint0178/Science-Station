# Inside templates.yaml

# ============================================================================
# MULTI-NODE LANDSLIDE DETECTION INTEGRATION (WOILD_V1.1.3)
# ============================================================================
# NOTE ON ADDING ADDITIONAL SENSORS (eg. LD02, LD03, ...):
# To add more nodes back into this configuration:
# 1. Copy any block belonging to an integration section below (Trigger, Live Tracker, Safety Matrix, Telemetry, or Battery).
# 2. Duplicate the block and replace all instances of "01" or "ld01" with your target node number (e.g., "02" / "ld02").
# 3. CRITICAL: In the "Binary Safety Matrix" section, make sure to update the unique 'baseline_x' and 'baseline_y' 
#    coordinates for each specific node to ensure accurate 2D movement and deviation tracking.
# 4. CRITICAL: In the "Live Trackers" section, update the unique 'latitude' and 'longitude' attributes to map 
#    the physical installation location of that specific hardware node.
# ============================================================================

- trigger:
    - platform: state
      entity_id:
        - sensor.landslide_01_angle_x
        - sensor.landslide_01_angle_y
        - sensor.landslide_01_humidity
        - sensor.landslide_01_battery_voltage
        - sensor.landslide_01_system_status
        - sensor.landslide_01_nonce
  sensor:
    - name: "LD01 Absolute Check-in Timestamp"
      unique_id: "ld01_landslide_absolute_check_in"
      state: "{{ now().isoformat() }}" 
      icon: "mdi:clock-digital"

# ============================================================================
# THE LIVE TRACKERS
# ============================================================================
- sensor:
    - name: "LD01 Time Since Last Check-in"
      unique_id: "ld01_landslide_time_since_check_in"
      icon: "mdi:heart-pulse"
      state: >
        {% set last_check = states('sensor.ld01_absolute_check_in_timestamp') %}
        {% if last_check in ['unknown', 'unavailable'] %}
          Unavailable
        {% else %}
          {{ ((as_timestamp(now()) - as_timestamp(last_check)) / 60) | int }}
        {% endif %}
      unit_of_measurement: "min"
      attributes:
        latitude: -1.4035346887246196
        longitude: -78.3138942718506
        icon_color: >
          {% set last_check = states('sensor.ld01_absolute_check_in_timestamp') %}
          {% if last_check in ['unknown', 'unavailable'] %} grey
          {% else %}
            {% set minutes = ((as_timestamp(now()) - as_timestamp(last_check)) / 60) | int %}
            {% if minutes <= 60 %} green
            {% elif minutes <= 120 %} yellow
            {% elif minutes <= 700 %} orange
            {% elif minutes >= 1440 %} #990000
            {% else %} grey {% endif %}
          {% endif %}

# ============================================================================
# BINARY SAFETY MATRIX
# ============================================================================
- binary_sensor:
    - name: "LD01 Landslide Alert Status"
      unique_id: "ld01_landslide_safety_status"
      device_class: safety
      state: >
        {% set hardware_alert = states('sensor.landslide_01_system_status') | lower == 'alert' %}
        {% set current_x = states('sensor.landslide_01_angle_x') | float(none) %}
        {% set current_y = states('sensor.landslide_01_angle_y') | float(none) %}
        {% if current_x is not none and current_y is not none %}
          {% set baseline_x = 1.81 %}
          {% set baseline_y = -4.11 %}
          {% set max_2d_creep_threshold = 5.0 %}
          {% set dx = current_x - baseline_x %}
          {% set dy = current_y - baseline_y %}
          {% set total_deviation = ((dx ** 2) + (dy ** 2)) ** 0.5 %}
          {% set slow_creep_alert = total_deviation > max_2d_creep_threshold %}
          {{ hardware_alert or slow_creep_alert }}
        {% else %}
          {{ false }}
        {% endif %}

# ============================================================================
# TELEMETRY BLOCKS (Clean Base Mappings)
# ============================================================================
- sensor:
    # --- NODE 01 ---
    - name: "LD01 Battery Voltage"
      unique_id: "ld01_sensor_battery_voltage"
      state_class: measurement
      device_class: voltage
      unit_of_measurement: "V"
      state: >
        {% set voltage = states('sensor.landslide_01_battery_voltage') %}
        {% if voltage in ['unknown', 'unavailable', 'none'] or not has_value('sensor.landslide_01_battery_voltage') %}
          unavailable
        {% else %}
          {{ voltage | float(0) | round(2) }}
        {% endif %}
      availability: >
        {{ has_value('sensor.landslide_01_battery_voltage') }}

    - name: "LD01 Temperature"
      unique_id: "ld01_sensor_temperature"
      state: "{{ states('sensor.landslide_01_temperature') }}"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
    
    - name: "LD01 Humidity"
      unique_id: "ld01_sensor_humidity"
      state: "{{ states('sensor.landslide_01_humidity') }}"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement

    - name: "LD01 Angle X"
      unique_id: "ld01_sensor_angle_x"
      state: "{{ states('sensor.landslide_01_angle_x') }}"
      unit_of_measurement: "°"
      state_class: measurement

    - name: "LD01 Angle Y"
      unique_id: "ld01_sensor_angle_y"
      state: "{{ states('sensor.landslide_01_angle_y') }}"
      unit_of_measurement: "°"
      state_class: measurement

    - name: "LD01 Dynamic Vector"
      unique_id: "ld01_sensor_dynamic_vector"
      state: "{{ states('sensor.landslide_01_peak_dynamic_vector_mg') }}"
      unit_of_measurement: "mg"
      state_class: measurement
      
    - name: "LD01 Landslide System Status"
      unique_id: "ld01_landslide_system_status"
      state: >
        {% set status = states('sensor.landslide_01_system_status') %}
        {{ status | title if status in ['timed', 'alert', 'calm'] else status }}
      icon: >
        {% if is_state('sensor.landslide_01_system_status', 'alert') %} mdi:alert-octagon
        {% elif is_state('sensor.landslide_01_system_status', 'timed') %} mdi:clock-check
        {% else %} mdi:shield-check {% endif %}

#=============
# Battery Percentages
#==============
- sensor:
    - name: "LD01 Battery Percentage Template"
      unique_id: "ld01_battery_percentage_templated"
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement
      state: >
        {% set v = states('sensor.ld01_battery_voltage') | float(none) %}
        {% if v is none %}
          unavailable
        {% elif v >= 4.10 %}
          100
        {% elif v >= 3.85 %}
          {{ (80 + (v - 3.85) * (100 - 80) / (4.10 - 3.85)) | round(1) }}
        {% elif v >= 3.70 %}
          {{ (50 + (v - 3.70) * (80 - 50) / (3.85 - 3.70)) | round(1) }}
        {% elif v >= 3.60 %}
          {{ (10 + (v - 3.60) * (50 - 10) / (3.70 - 3.60)) | round(1) }}
        {% elif v >= 3.20 %}
          {{ (0 + (v - 3.20) * (10 - 0) / (3.60 - 3.20)) | round(1) }}
        {% else %}
          0
        {% endif %}